services:
  pi:
    build:
      context: .
    image: secure-pi:latest
    stdin_open: true
    tty: true
    working_dir: /workspace
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m
      - /run:rw,noexec,nosuid,uid=10001,gid=10001,mode=0700,size=4m
      - /home/pi/.pi:rw,nosuid,uid=10001,gid=10001,mode=0700,size=256m
      - /home/pi/.pi/agent:rw,nosuid,uid=10001,gid=10001,mode=0700,size=256m
    pids_limit: 512
    mem_limit: 4g
    cpus: 2.0
    environment:
      PI_OFFLINE: "1"
      PI_SKIP_VERSION_CHECK: "1"
      PI_TELEMETRY: "0"
      PI_ALLOW_CONTEXT_FILES: "1"
      PI_DISABLE_BASH_TOOL: "0"
      PI_AUTH_FILE: /run/pi-auth.json
    volumes:
      - ${REPO_PATH:?Set REPO_PATH to an absolute repository path}:/workspace:rw
      - ${HOME}/.pi/agent/auth.json:/run/pi-auth.json:rw
